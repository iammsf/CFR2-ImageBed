name = "my-imgbed"
main = "worker.js"
compatibility_date = "2026-06-13"

# 自定义域名（与 Dashboard 中 my-imgbed 的域名绑定保持一致）
routes = [
  { pattern = "tuchuang.masi.fan", custom_domain = true }
]

[assets]
directory = "./public"
binding = "ASSETS"
# 静态资源直出 CDN，不经过 Worker，显著降低 CSS/JS/首页延迟
run_worker_first = false

# JWT 请在部署向导 / Dashboard Secrets 或本地 .dev.vars 中配置，勿提交到 Git

# 绑定 R2 存储桶（一键部署时会自动创建；也可在向导中改名）
[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "images"

# 绑定 D1 数据库（一键部署时会自动创建并回填 database_id）
[[d1_databases]]
binding = "DB"
database_name = "imgbed"
database_id = "4e12b7fc-9a28-48a5-89d2-0e9d1dea0dce"

# 日志和观察
[observability]
enabled = true